<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Accès Portail</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e9ecef; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: #ffffff; padding: 30px; border-radius: 10px; width: 350px; box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
        h2 { text-align: center; color: #333; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; color: #666; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 10px; border: none; border-radius: 4px; background: #007bff; color: white; font-size: 16px; cursor: pointer; }
        .btn-submit:hover { background: #0056b3; }
        .alert-danger { color: #721c24; background-color: #f8d7da; padding: 10px; border-radius: 4px; margin-top: 15px; text-align: center; }
        .alert-success { color: #155724; background-color: #d4edda; padding: 10px; border-radius: 4px; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>
<div class="auth-container">
    <h2>Identifiez-vous</h2>
    <form th:action="@{/process-signin}" method="post">
        <div class="input-group">
            <label for="username">Identifiant</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="input-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn-submit">Valider</button>
    </form>

    <div th:if="${param.invalid}" class="alert-danger">
        Vos accès sont incorrects.
    </div>
    <div th:if="${param.loggedout}" class="alert-success">
        Déconnexion effectuée.
    </div>
</div>
</body>
</html>
